name: branch-governance

on:
  pull_request:
  push:

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch naming
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Checking branch: $BRANCH"

          if [[ "$BRANCH" =~ ^feature\/.* ]] || \
             [[ "$BRANCH" =~ ^feat\/.* ]] || \
             [[ "$BRANCH" =~ ^bugfix\/.* ]] || \
             [[ "$BRANCH" =~ ^hotfix\/.* ]] || \
             [[ "$BRANCH" =~ ^chore\/.* ]] || \
             [[ "$BRANCH" == "qa" ]] || \
             [[ "$BRANCH" == "QA" ]] || \
             [[ "$BRANCH" == "development" ]] || \
             [[ "$BRANCH" == "main" ]]; then
            echo "Branch name valid"
          else
            echo "Invalid branch name: $BRANCH"
            exit 1
          fi

      - name: Validate PR flow
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          echo "PR Flow: $HEAD -> $BASE"

          # Allowed prefixes
          if [[ "$HEAD" =~ ^feature\/.* ]] || \
             [[ "$HEAD" =~ ^feat\/.* ]] || \
             [[ "$HEAD" =~ ^bugfix\/.* ]] || \
             [[ "$HEAD" =~ ^hotfix\/.* ]] || \
             [[ "$HEAD" =~ ^chore\/.* ]]; then
            PREFIX_OK=true
          else
            PREFIX_OK=false
          fi

          # development target
          if [[ "$BASE" == "development" ]]; then
            if [[ "$PREFIX_OK" != true ]]; then
              echo "Only feature/bugfix/hotfix/chore branches can merge into development"
              exit 1
            fi
          fi

          # qa target
          if [[ "$BASE" == "qa" || "$BASE" == "QA" ]]; then
            if [[ "$HEAD" == "development" ]]; then
              echo "Direct development -> qa merge not allowed"
              exit 1
            fi

            if [[ "$PREFIX_OK" != true ]]; then
              echo "Only feature/bugfix/hotfix/chore branches can merge into qa"
              exit 1
            fi
          fi

          # main target
          if [[ "$BASE" == "main" ]]; then

            if [[ "$HEAD" == "qa" || "$HEAD" == "QA" ]]; then
              echo "QA release allowed"
              exit 0
            fi

            if [[ "$HEAD" =~ ^hotfix\/.* ]]; then
              echo "Hotfix allowed to production"
              exit 0
            fi

            echo "Only qa or hotfix branches can merge into main"
            exit 1
          fi

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking commit messages..."

          git fetch origin ${{ github.base_ref }}

          COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --pretty=%B)

          echo "$COMMITS" | grep -E '^(feat|fix|refactor|test|chore|docs|perf|ci)(\(.+\))?: .+' \
          || (echo "One or more commit messages do not follow Conventional Commits" && exit 1)

          echo "Commit messages valid"